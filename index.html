<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Mapa Cultural de Lima</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; overflow: hidden; }
        .main-container { display: flex; height: 100vh; width: 100%; }

        /* BARRA LATERAL */
        .sidebar {
            width: 340px; min-width: 280px; max-width: 50vw;
            background: #f8f9fa; padding: 10px; overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px; z-index: 1001;
            resize: horizontal; overflow-x: hidden;
        }

        #map { flex-grow: 1; height: 100%; background: #e0e0e0; }

        .titulo-seccion { font-size: 0.9em; margin-bottom: 3px; color: #555; font-weight: bold; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        select.filtro-dia {
            width: 100%; padding: 8px; background: #fff; border: 1px solid #007bff;
            border-radius: 6px; font-size: 14px; color: #333; cursor: pointer; font-weight: bold;
        }

        .btn-filtro {
            width: 100%; padding: 8px 10px; cursor: pointer;
            background: #fff; border: 1px solid #ddd; border-radius: 6px; text-align: left; font-size: 13px;
            transition: all 0.2s; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
        }
        .btn-filtro:hover { background: #f1f3f5; transform: translateX(2px); }
        .btn-filtro.activo { background: #007bff; color: white; border-color: #0056b3; box-shadow: 0 2px 4px rgba(0,123,255,0.3); }

        .controles-resultados { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .btn-ordenar { background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        /* TARJETAS */
        .lista-container { margin-top: 5px; }
        .evento-card {
            background: white; border: 1px solid #e9ecef; border-radius: 8px; padding: 12px; 
            margin-bottom: 10px; cursor: pointer; transition: all 0.2s; position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .evento-card:hover { border-color: #007bff; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        .evento-card .meta-hora {
            display: inline-block; background: #e9ecef; padding: 2px 6px; border-radius: 4px; 
            font-size: 11px; color: #333; font-weight: bold; margin-bottom: 6px;
        }
        .evento-card .meta-lugar { 
            font-size: 12px; color: #007bff; font-weight: 700; margin-bottom: 2px; 
        }
        .evento-card .meta-direccion { 
            font-size: 11px; color: #666; font-style: italic; margin-bottom: 6px; display: block;
        }
        .evento-card .meta-descripcion {
            font-size: 12px; color: #444; margin: 6px 0 0 0; line-height: 1.4;
        }

        .btn-agendar {
            position: absolute; top: 10px; right: 10px;
            padding: 4px 10px; font-size: 11px; border: 1px solid #007bff;
            background: white; color: #007bff; border-radius: 20px;
            cursor: pointer; transition: all 0.2s; font-weight: 600;
        }
        .btn-agendar:hover { background: #f0f8ff; }
        .btn-agendar.agendado { background: #007bff; color: white; border-color: #0056b3; }

        .btn-ruta-final { 
            background: #28a745; color: white; font-weight: bold; font-size: 14px;
            text-align: center; border: none; padding: 12px; margin-top: 5px; cursor: pointer; width: 100%; border-radius: 6px;
            box-shadow: 0 2px 4px rgba(40, 167, 69, 0.3); transition: background 0.2s;
        }
        .btn-ruta-final:hover { background: #218838; }

        .info-ruta { margin-top: 15px; font-size: 12px; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #dee2e6; }

        /* PANEL DE AGENDA */
        .agenda-panel {
            position: fixed;
            top: 90px;
            right: 20px;
            width: 320px;
            max-height: calc(100vh - 120px);
            overflow: auto;
            background: rgba(255,255,255,0.96);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 10px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            padding: 10px 12px;
            z-index: 2000;
            display: none;
        }
        .agenda-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .agenda-panel-header h4 { margin: 0; font-size: 14px; }
        .agenda-btn { background: #007bff; color: white; border: none; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 11px; }
        .agenda-btn:hover { background: #0056b3; }
        .agenda-item {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid rgba(0,0,0,0.08); padding: 6px 0;
        }
        .agenda-item:last-child { border-bottom: none; }
        .agenda-item button { background: transparent; border: none; color: #dc3545; cursor: pointer; font-size: 14px; }
        .agenda-item .agenda-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
        .agenda-item .agenda-meta { font-size: 11px; color: #555; }

        /* ICONOS MAPA */
        .icono-numero {
            background-color: #007bff; color: white; border-radius: 50%; text-align: center;
            line-height: 24px; font-weight: bold; font-size: 12px; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .icono-numero.inicio { background-color: #28a745; width: 30px !important; height: 30px !important; line-height: 26px; font-size: 14px; z-index: 1000 !important; }
    </style>
</head>
<body>

    <div id="build-banner" style="position:fixed; top:0; left:0; right:0; background:#000; color:#fff; font-size:12px; padding:4px 8px; z-index:9999; text-align:center;">
        UI build: <span id="build-badge">(cargando...)</span>
    </div>

    <div class="main-container" style="margin-top: 26px;">
        <div class="sidebar">
            <div class="titulo-seccion">📅 ¿Cuándo quieres salir?</div>
            <div style="font-size:11px; color:#666; margin-top:4px;">UI v=20260323-1</div>
            <select id="select-dias" class="filtro-dia" onchange="cambiarFiltroDia()">
                <option value="Todos">Cargando días...</option>
            </select>
            <div id="last-update" style="font-size:12px; color:#555; margin-top:8px;">Actualizando...</div>

            <div class="titulo-seccion">🎭 ¿Qué te provoca?</div>
            <div id="botones-categorias">
                <button class="btn-filtro activo" onclick="cambiarFiltroCategoria('Todos', this)">👁️ Ver Todo</button>
                <button class="btn-filtro" onclick="cambiarFiltroCategoria('Teatro', this)">🎭 Teatro</button>
                <button class="btn-filtro" onclick="cambiarFiltroCategoria('Música', this)">🎵 Música</button>
                <button class="btn-filtro" onclick="cambiarFiltroCategoria('Cine', this)">🎬 Cine</button>
                <button class="btn-filtro" onclick="cambiarFiltroCategoria('Arte/Expo', this)">🖼️ Arte / Expo</button>
            </div>
            
            <hr style="width: 100%; border-color: #eee; margin: 10px 0;">

            <div class="controles-resultados">
                <div class="titulo-seccion" style="margin:0">Eventos (<span id="contador-eventos">0</span>)</div>
                <button class="btn-ordenar" onclick="ordenarResultadosPorHora()">🕒 Ordenar por Hora</button>
            </div>

            <div id="lista-lateral" class="lista-container">
                <p style="font-size:12px; color:#666; text-align:center;">Cargando datos culturales...</p>
            </div>

            <hr style="width: 100%; border-color: #eee; margin: 10px 0;">
            <button class="btn-ruta-final" onclick="crearRutaConSeleccionados()">🚀 Crear Ruta</button>
            <div id="lista-ruta-resultado" class="info-ruta" style="display: none;"></div>
        </div>

        <div id="agenda-panel" class="agenda-panel">
            <div class="agenda-panel-header">
                <h4>Tu agenda</h4>
                <button class="agenda-btn" onclick="toggleAgendaPanel()">✕</button>
            </div>
            <div id="agenda-list"></div>
            <button class="btn-ruta-final" onclick="crearRutaConSeleccionados()">🚀 Crear ruta</button>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        console.log('Mapa Cultural UI v=20260323-1');

        try {
            const firebaseConfig = {
                apiKey: "AIzaSyCxwRwF97SheBpKd0bfZ6Gcw8XQH2QwNbc",
                authDomain: "mapacultural-lima.firebaseapp.com",
                projectId: "mapacultural-lima",
                storageBucket: "mapacultural-lima.firebasestorage.app",
                messagingSenderId: "170254428690",
                appId: "1:170254428690:web:0b7dbd02636b6af29446cb"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();

            const map = L.map('map').setView([-12.046, -77.042], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

            let todosLosEventos = [];
            let eventosActuales = [];
            let seleccionadosIDs = new Set();
            let marcadores = {};
            let lineaRuta = null;
            let flechasRuta = null;
            let marcadoresRuta = [];
            let filtroDiaActual = 'Todos';
            let filtroCategoriaActual = 'Todos';
            let ordenarPorHoraActivo = false;

            const ordenSemana = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

            function mostrarUltimaActualizacion(timestamp) {
                const el = document.getElementById('last-update');
                if (!timestamp) { el.innerText = 'Última actualización: (sin registro)'; return; }
                const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                el.innerText = `Última actualización: ${d.toLocaleString('es-PE', { dateStyle: 'medium', timeStyle: 'short' })}`;
            }

            db.collection("meta").doc("lastUpdate").get().then(doc => {
                mostrarUltimaActualizacion(doc.exists ? doc.data().updatedAt : null);
            }).catch(() => mostrarUltimaActualizacion(null));

            db.collection("eventos").get().then((snapshot) => {
                if (snapshot.empty) {
                    document.getElementById('lista-lateral').innerHTML = "<p>Base de datos vacía. Corre el scraper de Python.</p>";
                    return;
                }
                snapshot.forEach((doc) => {
                    let data = doc.data();
                    data.id = doc.id;
                    todosLosEventos.push(data);
                });
                llenarDropdownDias();
                aplicarFiltrosCombinados();
            }).catch(e => alert("Error DB: " + e.message));

            function normalizeDia(dia) {
                return (dia || '').toString().trim().replace(/\s+/g, ' ');
            }

            function parseDia(dia) {
                const parts = normalizeDia(dia).split(' ');
                return { nombre: parts[0] || '', numero: parts.length > 1 ? parseInt(parts[1], 10) : NaN };
            }

            function compareDias(a, b) {
                const da = parseDia(a.dia), db = parseDia(b.dia);
                const ia = ordenSemana.indexOf(da.nombre), ib = ordenSemana.indexOf(db.nombre);
                if (ia !== -1 && ib !== -1 && ia !== ib) return ia - ib;
                if (ia !== -1 && ib === -1) return -1;
                if (ib !== -1 && ia === -1) return 1;
                if (da.nombre === db.nombre && !isNaN(da.numero) && !isNaN(db.numero)) return da.numero - db.numero;
                return (a.dia || '').localeCompare(b.dia || '', 'es');
            }

            function parseHora(hora) {
                if (!hora) return Number.MAX_SAFE_INTEGER;
                let c = hora.toString().trim().toLowerCase().replace(/a las\s*/g, '').replace(/\./g, '');
                const m = c.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
                if (!m) return Number.MAX_SAFE_INTEGER;
                let h = parseInt(m[1], 10), min = m[2] ? parseInt(m[2], 10) : 0;
                const ampm = m[3] ? m[3].toLowerCase() : null;
                if (ampm === 'pm' && h < 12) h += 12;
                if (ampm === 'am' && h === 12) h = 0;
                return h * 60 + min;
            }

            function ordenarEventosPorDiaHora(lista) {
                return lista.sort((a, b) => {
                    const cmpDia = compareDias(a, b);
                    return cmpDia !== 0 ? cmpDia : parseHora(a.hora) - parseHora(b.hora);
                });
            }

            function llenarDropdownDias() {
                const select = document.getElementById('select-dias');
                const diasUnicos = new Set();
                todosLosEventos.forEach(ev => { if (ev.dia) diasUnicos.add(normalizeDia(ev.dia)); });

                const listaDias = Array.from(diasUnicos).sort((a, b) => {
                    const da = parseDia(a), db = parseDia(b);
                    const ia = ordenSemana.indexOf(da.nombre), ib = ordenSemana.indexOf(db.nombre);
                    if (ia !== -1 && ib !== -1 && ia !== ib) return ia - ib;
                    if (ia !== -1 && ib === -1) return -1;
                    if (ib !== -1 && ia === -1) return 1;
                    if (da.nombre === db.nombre && !isNaN(da.numero) && !isNaN(db.numero)) return da.numero - db.numero;
                    return a.localeCompare(b, 'es');
                });

                select.innerHTML = '<option value="Todos">📅 Todos los Días</option>';
                listaDias.forEach(dia => {
                    let opt = document.createElement("option");
                    opt.value = dia; opt.text = dia;
                    select.appendChild(opt);
                });
            }

            function cambiarFiltroDia() {
                filtroDiaActual = document.getElementById('select-dias').value;
                aplicarFiltrosCombinados();
            }

            function cambiarFiltroCategoria(categoria, boton) {
                filtroCategoriaActual = categoria;
                document.querySelectorAll('#botones-categorias .btn-filtro').forEach(b => b.classList.remove('activo'));
                boton.classList.add('activo');
                aplicarFiltrosCombinados();
            }

            function aplicarFiltrosCombinados() {
                eventosActuales = todosLosEventos.filter(ev => {
                    const diaOk = filtroDiaActual === 'Todos' || normalizeDia(ev.dia) === filtroDiaActual;
                    const catOk = filtroCategoriaActual === 'Todos' || ev.tipo === filtroCategoriaActual;
                    return diaOk && catOk;
                });
                if (ordenarPorHoraActivo) ordenarEventosPorDiaHora(eventosActuales);
                actualizarVista(eventosActuales);
            }

            function ordenarResultadosPorHora() {
                ordenarPorHoraActivo = true;
                ordenarEventosPorDiaHora(eventosActuales);
                actualizarVista(eventosActuales);
            }

            function limpiarRutaEnMapa() {
                if (lineaRuta) map.removeLayer(lineaRuta);
                if (flechasRuta) map.removeLayer(flechasRuta);
                marcadoresRuta.forEach(m => map.removeLayer(m));
                marcadoresRuta = [];
            }

            // ─────────────────────────────────────────────
            // VISTA PRINCIPAL — TARJETAS (MODIFICADA)
            // ─────────────────────────────────────────────
            function actualizarVista(lista) {
                limpiarRutaEnMapa();
                for (let id in marcadores) map.removeLayer(marcadores[id]);
                marcadores = {};

                document.getElementById('contador-eventos').innerText = lista.length;

                if (lista.length === 0) {
                    document.getElementById('lista-lateral').innerHTML =
                        "<p style='text-align:center; padding:10px; color:#777;'>Sin resultados.</p>";
                    return;
                }

                let html = "";
                lista.forEach(ev => {
                    const lat = parseFloat(ev.lat), lon = parseFloat(ev.lon);
                    if (isNaN(lat)) return;

                    const marker = L.marker([lat, lon]).bindPopup(`<b>${ev.hora || 'Sin hora'}</b><br>${ev.lugar}`);
                    marker.addTo(map);
                    marcadores[ev.id] = marker;

                    const agendado = seleccionadosIDs.has(ev.id);
                    const btnClass = agendado ? 'btn-agendar agendado' : 'btn-agendar';
                    const btnText  = agendado ? '✅ Agendado' : 'Agendar';

                    // CAMBIO: Solo usamos descripción. Ignoramos 'nombre' para evitar redundancia.
                    const descripcion = (ev.descripcion || '').replace(/\s+/g, ' ').trim();
                    const hora        = ev.hora || 'Hora no especificada';
                    const lugar       = ev.lugar || '';
                    const direccion   = ev.direccion || '';

                    html += `
                        <div class="evento-card" onclick="resaltarEnMapa('${ev.id}')">
                            <button id="btn-${ev.id}" class="${btnClass}"
                                onclick="event.stopPropagation(); toggleAgendar('${ev.id}')">
                                ${btnText}
                            </button>

                            <span class="meta-hora">🕒 ${hora}</span>
                            <div class="meta-lugar">📍 ${lugar}</div>
                            ${direccion ? `<span class="meta-direccion">${direccion}</span>` : ''}
                            <p class="meta-descripcion">${descripcion}</p>
                        </div>`;
                });

                document.getElementById('lista-lateral').innerHTML = html;
            }

            function resaltarEnMapa(id) {
                const marker = marcadores[id];
                if (marker) {
                    map.flyTo(marker.getLatLng(), 16, { duration: 1.5 });
                    marker.openPopup();
                }
            }

            function ordenarSeleccionadosPorHora(ids) {
                const arr = Array.from(ids).map(id => todosLosEventos.find(ev => ev.id === id)).filter(Boolean);
                return ordenarEventosPorDiaHora(arr);
            }

            function toggleAgendaPanel() {
                const panel = document.getElementById('agenda-panel');
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            }

            function updateAgendaPanel() {
                const panel = document.getElementById('agenda-panel');
                const list  = document.getElementById('agenda-list');
                const seleccionados = ordenarSeleccionadosPorHora(seleccionadosIDs);

                if (seleccionados.length === 0) { panel.style.display = 'none'; return; }

                panel.style.display = 'block';
                list.innerHTML = '';

                seleccionados.forEach(ev => {
                    const item = document.createElement('div');
                    item.className = 'agenda-item';
                    
                    // CAMBIO: Título de agenda basado en el inicio de la descripción
                    const desc = (ev.descripcion || '');
                    const tituloResumen = desc.length > 50 ? desc.slice(0, 50).trim() + '...' : desc;

                    item.innerHTML = `
                        <div style="flex:1;">
                            <div class="agenda-title">${ev.hora || '??:??'} · ${tituloResumen}</div>
                            <div class="agenda-meta">${ev.lugar}${ev.direccion ? ' · ' + ev.direccion : ''}</div>
                        </div>
                        <button onclick="event.stopPropagation(); toggleAgendar('${ev.id}')">✕</button>`;
                    item.addEventListener('click', () => resaltarEnMapa(ev.id));
                    list.appendChild(item);
                });
            }

            window.toggleAgendar = function(id) {
                const btn = document.getElementById(`btn-${id}`);
                if (seleccionadosIDs.has(id)) {
                    seleccionadosIDs.delete(id);
                    if (btn) { btn.classList.remove('agendado'); btn.innerHTML = 'Agendar'; }
                } else {
                    seleccionadosIDs.add(id);
                    if (btn) { btn.classList.add('agendado'); btn.innerHTML = '✅ Agendado'; }
                }
                document.getElementById('lista-ruta-resultado').style.display = 'none';
                limpiarRutaEnMapa();
                updateAgendaPanel();
            }

            window.crearRutaConSeleccionados = function() {
                const ruta = ordenarSeleccionadosPorHora(seleccionadosIDs);
                if (ruta.length < 2) { alert("Selecciona al menos 2 eventos."); return; }

                limpiarRutaEnMapa();
                for (let id in marcadores) map.removeLayer(marcadores[id]);

                const latlngs = [];
                ruta.forEach((ev, i) => {
                    const lat = parseFloat(ev.lat), lon = parseFloat(ev.lon);
                    latlngs.push([lat, lon]);
                    const cls  = i === 0 ? 'inicio' : '';
                    const icon = L.divIcon({
                        className: 'custom',
                        html: `<div class='icono-numero ${cls}'>${i + 1}</div>`,
                        iconSize: [25, 25], iconAnchor: [12, 12]
                    });
                    const m = L.marker([lat, lon], { icon })
                        .bindPopup(`<b>${i + 1}. ${ev.hora}</b><br>${ev.lugar}`)
                        .addTo(map);
                    marcadoresRuta.push(m);
                });

                lineaRuta = L.polyline(latlngs, { color: '#007bff', weight: 4, opacity: 0.8, dashArray: '10, 10' }).addTo(map);

                flechasRuta = L.polylineDecorator(lineaRuta, {
                    patterns: [
                        {
                            offset: '10%', repeat: 0, endOffset: '25px',
                            symbol: L.Symbol.arrowHead({ pixelSize: 15, polygon: false, pathOptions: { stroke: true, color: '#007bff', weight: 3 } })
                        },
                        {
                            offset: '50%', repeat: '300px',
                            symbol: L.Symbol.arrowHead({ pixelSize: 12, polygon: false, pathOptions: { stroke: true, color: '#007bff', weight: 2 } })
                        }
                    ]
                }).addTo(map);

                map.fitBounds(lineaRuta.getBounds(), { padding: [50, 50] });

                let html = "<b>🗓️ Tu Ruta Cultural:</b><br>";
                ruta.forEach((e, i) => {
                    const desc = (e.descripcion || '');
                    const resumen = desc.length > 40 ? desc.slice(0, 40).trim() + '...' : desc;
                    html += `
                        <div style="margin-bottom:8px; border-bottom:1px dotted #ccc; padding-bottom:5px;">
                            <span style="background:${i === 0 ? '#28a745' : '#007bff'}; color:white; border-radius:50%; padding:2px 7px; font-size:11px; font-weight:bold;">${i + 1}</span>
                            <b>${e.hora}</b> - ${resumen}<br>
                            <small style="color:#666; margin-left:25px; display:block;">📍 ${e.lugar}</small>
                        </div>`;
                });

                const r = document.getElementById('lista-ruta-resultado');
                r.innerHTML = html;
                r.style.display = 'block';
                r.scrollIntoView({ behavior: 'smooth' });
            }

        } catch (e) { alert("Error crítico: " + e.message); }
    </script>
</body>
</html>
